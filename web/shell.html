<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Red Alert</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #ddd;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #ra-stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        touch-action: none;
      }

      #canvas {
        display: block;
        background: #000;
        outline: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }

      #canvas:focus {
        outline: none;
      }

      #ra-ui {
        position: fixed;
        top: env(safe-area-inset-top, 0);
        right: env(safe-area-inset-right, 0);
        padding: 8px;
        display: flex;
        gap: 6px;
        z-index: 10;
        opacity: 0.35;
        transition: opacity 0.2s ease;
      }

      #ra-ui:hover,
      #ra-ui:focus-within,
      #ra-ui.visible {
        opacity: 1.0;
      }

      .ra-btn {
        appearance: none;
        border: 1px solid #555;
        background: rgba(20, 20, 20, 0.75);
        color: #eee;
        font: inherit;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
        line-height: 1;
      }

      .ra-btn:hover {
        background: rgba(50, 50, 50, 0.85);
        border-color: #888;
      }

      .ra-btn:active {
        background: rgba(80, 80, 80, 0.9);
      }

      #ra-status {
        position: fixed;
        left: 0;
        right: 0;
        bottom: env(safe-area-inset-bottom, 0);
        padding: 6px 12px;
        font-size: 13px;
        text-align: center;
        color: #ccc;
        background: rgba(0, 0, 0, 0.6);
        pointer-events: none;
        z-index: 9;
        transition: opacity 0.3s ease;
      }

      #ra-status.hidden {
        opacity: 0;
      }

      .ra-btn:disabled {
        opacity: 0.45;
      }

      #ra-error-panel {
        position: fixed;
        left: 0;
        right: 0;
        top: env(safe-area-inset-top, 0);
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 48vh;
        padding: 10px 12px 12px;
        box-sizing: border-box;
        background: linear-gradient(180deg, rgba(44, 0, 0, 0.97), rgba(20, 0, 0, 0.95));
        border-bottom: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        color: #ffd7d7;
        z-index: 11;
      }

      #ra-error-panel.hidden {
        display: none;
      }

      #ra-error-bar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      #ra-error-meta {
        min-width: 0;
        flex: 1 1 auto;
      }

      #ra-error-title {
        margin: 0;
        color: #ffc0c0;
        font: 600 12px/1.2 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #ra-error-copy-status {
        min-height: 1.2em;
        margin-top: 3px;
        color: #e7bbbb;
        font: 11px/1.3 ui-sans-serif, system-ui, sans-serif;
      }

      #ra-error-copy-status[data-state="success"] {
        color: #ffd9a1;
      }

      #ra-error-copy-status[data-state="error"] {
        color: #ff9f9f;
      }

      #ra-error-copy {
        flex: 0 0 auto;
        padding: 6px 10px;
        font-size: 11px;
      }

      #ra-error-log {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        margin: 0;
        padding: 0 2px 0 0;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        user-select: text;
      }

      #ra-soft-keyboard-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: env(safe-area-inset-bottom, 0);
        z-index: 12;
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0));
        background: rgba(0, 0, 0, 0.88);
        border-top: 1px solid rgba(255, 255, 255, 0.18);
        transform: translateY(110%);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.18s ease, opacity 0.18s ease;
      }

      #ra-soft-keyboard-panel.active {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      #ra-soft-keyboard-state {
        min-height: 1.2em;
        margin-bottom: 4px;
        font-size: 12px;
        color: #9fd18b;
      }

      #ra-soft-keyboard-debug {
        min-height: 1.2em;
        margin-bottom: 6px;
        font-size: 11px;
        color: #cfcfcf;
      }

      #ra-soft-keyboard {
        display: block;
        width: 100%;
        min-height: 48px;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #666;
        border-radius: 6px;
        background: rgba(20, 20, 20, 0.95);
        color: #fff;
        caret-color: #fff;
        font: inherit;
        font-size: 18px;
        line-height: 1.25;
        outline: none;
        resize: none;
        touch-action: auto;
        -webkit-user-select: text;
        user-select: text;
      }

      #ra-soft-keyboard:focus {
        border-color: #d0d0d0;
      }

      /* When the page or canvas is in native browser fullscreen, keep the
         render stage pinned to the full viewport. */
      html:fullscreen #ra-stage,
      html:-webkit-full-screen #ra-stage,
      #canvas:fullscreen,
      #canvas:-webkit-full-screen {
        inset: 0;
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw;
        max-height: 100vh;
      }

      html:fullscreen #canvas,
      html:-webkit-full-screen #canvas,
      #canvas:fullscreen,
      #canvas:-webkit-full-screen {
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="ra-stage">
      <canvas
        id="canvas"
        oncontextmenu="event.preventDefault()"
        tabindex="-1"
      ></canvas>
    </div>

    <div id="ra-ui">
      <button id="ra-fullscreen" class="ra-btn" type="button" title="Toggle fullscreen (F11)">Fullscreen</button>
    </div>

    <div id="ra-status">Downloading...</div>
    <div id="ra-error-panel" class="hidden" role="log" aria-live="assertive" aria-atomic="false">
      <div id="ra-error-bar">
        <div id="ra-error-meta">
          <div id="ra-error-title">Runtime error log</div>
          <div id="ra-error-copy-status" data-state="idle"></div>
        </div>
        <button id="ra-error-copy" class="ra-btn" type="button" disabled>Copy</button>
      </div>
      <pre id="ra-error-log"></pre>
    </div>
    <div id="ra-soft-keyboard-panel" aria-live="polite" aria-atomic="true">
      <div id="ra-soft-keyboard-state">Mobile keyboard idle</div>
      <div id="ra-soft-keyboard-debug"></div>
      <textarea
        id="ra-soft-keyboard"
        inputmode="text"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        enterkeyhint="done"
        tabindex="0"
        rows="1"
        cols="1"
        placeholder="Tap here to type into the selected game field"
      ></textarea>
    </div>

    <script type="text/javascript">
      (function () {
        var canvas = document.getElementById('canvas');
        var stage = document.getElementById('ra-stage');
        var statusEl = document.getElementById('ra-status');
        var errorPanelEl = document.getElementById('ra-error-panel');
        var errorLogEl = document.getElementById('ra-error-log');
        var errorCopyBtn = document.getElementById('ra-error-copy');
        var errorCopyStatusEl = document.getElementById('ra-error-copy-status');
        var ui = document.getElementById('ra-ui');
        var fsBtn = document.getElementById('ra-fullscreen');
        var softKeyboardPanel = document.getElementById('ra-soft-keyboard-panel');
        var softKeyboardState = document.getElementById('ra-soft-keyboard-state');
        var softKeyboardDebug = document.getElementById('ra-soft-keyboard-debug');
        var softKeyboardInput = document.getElementById('ra-soft-keyboard');
        var fatalErrorActive = false;
        var stderrBuffer = [];
        var stderrSequence = 0;
        var lastFatalStderrSeq = 0;
        var fatalErrorCount = 0;
        var errorCopyResetTimer = 0;

        // ---- Size management --------------------------------------------------
        // Compute the renderable area in CSS pixels. We clamp to the actual
        // visible viewport so that the canvas never exceeds the browser chrome
        // (phone address bars, on-screen keyboards, etc.). visualViewport gives
        // us the most accurate answer on mobile; innerWidth/innerHeight is the
        // fallback for desktop browsers.
        function getViewportSize() {
          var w = window.innerWidth || document.documentElement.clientWidth;
          var h = window.innerHeight || document.documentElement.clientHeight;
          if (window.visualViewport) {
            w = Math.min(w, Math.floor(window.visualViewport.width));
            h = Math.min(h, Math.floor(window.visualViewport.height));
          }
          if (w < 1) w = 1;
          if (h < 1) h = 1;
          return { width: w, height: h };
        }

        // Apply a new size to the canvas. This sets both the CSS size (what the
        // user sees) and the drawing-buffer size (what SDL/GL render into) so
        // they stay in lock-step. SDL3's emscripten backend picks up CSS size
        // changes and posts SDL_EVENT_WINDOW_RESIZED automatically.
        function applySize(width, height) {
          var cssWidth = width + 'px';
          var cssHeight = height + 'px';
          var changed = canvas.style.width !== cssWidth ||
                        canvas.style.height !== cssHeight ||
                        canvas.width !== width ||
                        canvas.height !== height;
          canvas.style.width = cssWidth;
          canvas.style.height = cssHeight;
          // Only assign the drawing-buffer size when it actually differs; some
          // GL drivers treat every assignment as a full reallocation.
          if (canvas.width !== width) canvas.width = width;
          if (canvas.height !== height) canvas.height = height;
          return changed;
        }

        function resizeToViewport(reason) {
          var changed = false;
          var fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
          // In browser fullscreen, size against the active fullscreen element so
          // document-root fullscreen and canvas-only fullscreen both work.
          if (fullscreenElement) {
            var rectSource = fullscreenElement === canvas ? canvas : stage;
            var rect = rectSource.getBoundingClientRect();
            changed = applySize(Math.max(1, Math.floor(rect.width)),
                                Math.max(1, Math.floor(rect.height)));
          } else {
            var s = getViewportSize();
            changed = applySize(s.width, s.height);
          }
          if (changed && window.Module && window.Module.raSoftKeyboard &&
              (window.Module.raSoftKeyboard.active || window.Module.raSoftKeyboard.focused)) {
            scheduleSoftKeyboardRedraw(reason || 'viewport');
          }
        }

        // Pre-size the canvas before the wasm Module initializes so the game's
        // initial SDL_CreateWindow / SDL_GetDisplayBounds call sees the right
        // dimensions and the renderable area is correct from the first frame.
        resizeToViewport();

        // React to every way the viewport can change size on desktop or mobile.
        window.addEventListener('resize', function () { resizeToViewport('window-resize'); }, { passive: true });
        window.addEventListener('orientationchange', function () {
          // Orientation change fires before the new viewport is committed; defer.
          setTimeout(function () { resizeToViewport('orientation-50'); }, 50);
          setTimeout(function () { resizeToViewport('orientation-250'); }, 250);
        }, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', function () { resizeToViewport('visualViewport-resize'); }, { passive: true });
          window.visualViewport.addEventListener('scroll', function () { resizeToViewport('visualViewport-scroll'); }, { passive: true });
        }
        document.addEventListener('fullscreenchange', function () { resizeToViewport('fullscreenchange'); });
        document.addEventListener('webkitfullscreenchange', function () { resizeToViewport('webkitfullscreenchange'); });

        // ---- Fullscreen toggle -----------------------------------------------
        function isFullscreen() {
          return !!(document.fullscreenElement || document.webkitFullscreenElement);
        }

        function isPromiseLike(value) {
          return !!value && typeof value.then === 'function';
        }

        function logFullscreenFailure(action, err) {
          if (window.Module && window.Module.raSoftKeyboard) {
            window.Module.raSoftKeyboard.log('fullscreen-' + action + '-failed', err && err.message ? err.message : err);
          }
          console.warn('Fullscreen ' + action + ' failed:', err);
        }

        function callFullscreenApi(fn, thisArg, args, action, fallback) {
          if (!fn) return;

          var result;
          try {
            result = fn.apply(thisArg, args || []);
          } catch (err) {
            if (fallback) {
              fallback(err);
              return;
            }
            logFullscreenFailure(action, err);
            return;
          }

          if (isPromiseLike(result)) {
            result.catch(function (err) {
              if (fallback) {
                fallback(err);
                return;
              }
              logFullscreenFailure(action, err);
            });
          }
        }

        function toggleFullscreen() {
          if (isFullscreen()) {
            var exit = document.exitFullscreen || document.webkitExitFullscreen;
            callFullscreenApi(exit, document, [], 'exit');
          } else {
            var fullscreenTarget = document.documentElement || stage || canvas;
            var req = fullscreenTarget.requestFullscreen || fullscreenTarget.webkitRequestFullscreen;
            if (req) {
              callFullscreenApi(req, fullscreenTarget, [], 'enter');
            }
          }
          canvas.focus();
        }

        fsBtn.addEventListener('click', function (e) {
          e.preventDefault();
          toggleFullscreen();
        });

        // Keyboard shortcut: F11 toggles, but only when focus is on the canvas
        // or our chrome, so we don't steal it from other iframes on a host page.
        window.addEventListener('keydown', function (e) {
          if (e.key === 'F11') {
            e.preventDefault();
            toggleFullscreen();
          }
        });

        // Show the UI briefly whenever the pointer moves so it's discoverable
        // without being visually intrusive during gameplay.
        var uiHideTimer = null;
        function flashUi() {
          ui.classList.add('visible');
          if (uiHideTimer) clearTimeout(uiHideTimer);
          uiHideTimer = setTimeout(function () { ui.classList.remove('visible'); }, 1500);
        }
        window.addEventListener('mousemove', flashUi, { passive: true });
        window.addEventListener('touchstart', flashUi, { passive: true });

        // ---- Status readout ---------------------------------------------------
        function setStatus(text) {
          if (!statusEl) return;
          if (!text) {
            statusEl.classList.add('hidden');
            statusEl.textContent = '';
            return;
          }
          statusEl.classList.remove('hidden');
          statusEl.textContent = text;
        }

        function stringifyErrorValue(value) {
          if (value == null) return '';
          if (typeof value === 'string') return value;
          if (value instanceof Error) {
            return value.stack || (value.name + ': ' + value.message);
          }
          if (typeof value === 'object') {
            try {
              return JSON.stringify(value, null, 2);
            } catch (e) {}
          }
          return String(value);
        }

        function pushStderrLine(text) {
          var line = stringifyErrorValue(text);
          if (!line) return;
          stderrSequence += 1;
          stderrBuffer.push({ seq: stderrSequence, text: line });
          if (stderrBuffer.length > 80) {
            stderrBuffer.shift();
          }
        }

        function setErrorCopyStatus(text, state) {
          if (!errorCopyStatusEl) return;
          errorCopyStatusEl.textContent = text || '';
          errorCopyStatusEl.dataset.state = state || 'idle';
        }

        function resetErrorCopyHint(delay) {
          if (errorCopyResetTimer) {
            clearTimeout(errorCopyResetTimer);
            errorCopyResetTimer = 0;
          }
          errorCopyResetTimer = setTimeout(function () {
            errorCopyResetTimer = 0;
            if (errorLogEl && errorLogEl.textContent) {
              setErrorCopyStatus('Tap Copy to copy the full error log.', 'idle');
            } else {
              setErrorCopyStatus('', 'idle');
            }
          }, delay || 1800);
        }

        function updateErrorCopyButton() {
          if (!errorCopyBtn) return;
          errorCopyBtn.disabled = !(errorLogEl && errorLogEl.textContent);
        }

        function collectRecentStderr(afterSeq) {
          var lines = [];
          for (var i = 0; i < stderrBuffer.length; ++i) {
            if (stderrBuffer[i].seq > afterSeq) {
              lines.push(stderrBuffer[i]);
            }
          }
          return lines;
        }

        function appendErrorLog(text, block) {
          if (!errorLogEl || !text) return;
          if (errorPanelEl) {
            errorPanelEl.classList.remove('hidden');
          }
          errorLogEl.textContent += (errorLogEl.textContent ? (block ? '\n\n' : '\n') : '') + text;
          errorLogEl.scrollTop = errorLogEl.scrollHeight;
          updateErrorCopyButton();
          if (errorLogEl.textContent && (!errorCopyStatusEl || !errorCopyStatusEl.textContent)) {
            setErrorCopyStatus('Tap Copy to copy the full error log.', 'idle');
          }
        }

        function reportFatalError(summary, details) {
          var blocks = [];
          var summaryText = stringifyErrorValue(summary) || 'Unexpected runtime error';
          var stderrLines = collectRecentStderr(lastFatalStderrSeq);
          fatalErrorActive = true;
          fatalErrorCount += 1;
          setStatus(summaryText);
          blocks.push('[' + fatalErrorCount + ' @ ' + new Date().toISOString() + '] ' + summaryText);
          var detailText = stringifyErrorValue(details);
          if (detailText && detailText !== summaryText) {
            blocks.push(detailText);
          }
          if (stderrLines.length) {
            blocks.push('Recent stderr:\n' + stderrLines.map(function (entry) { return entry.text; }).join('\n'));
            lastFatalStderrSeq = stderrLines[stderrLines.length - 1].seq;
          }
          appendErrorLog(blocks.join('\n\n'), true);
        }

        function fallbackCopyErrorLog(text) {
          if (!text) return false;
          var helper = document.createElement('textarea');
          helper.value = text;
          helper.setAttribute('readonly', 'readonly');
          helper.style.position = 'fixed';
          helper.style.top = '0';
          helper.style.left = '-9999px';
          helper.style.opacity = '0';
          document.body.appendChild(helper);
          try {
            helper.focus({ preventScroll: true });
          } catch (e) {
            helper.focus();
          }
          helper.select();
          helper.setSelectionRange(0, helper.value.length);
          var copied = false;
          try {
            copied = !!(document.execCommand && document.execCommand('copy'));
          } catch (e2) {}
          document.body.removeChild(helper);
          return copied;
        }

        function copyErrorLogToClipboard() {
          var text = errorLogEl ? errorLogEl.textContent : '';
          if (!text) {
            setErrorCopyStatus('Nothing to copy yet.', 'error');
            resetErrorCopyHint(1400);
            return;
          }

          setErrorCopyStatus('Copying full error log...', 'idle');
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
              setErrorCopyStatus('Copied the full error log.', 'success');
              resetErrorCopyHint();
            }, function () {
              if (fallbackCopyErrorLog(text)) {
                setErrorCopyStatus('Copied the full error log.', 'success');
              } else {
                setErrorCopyStatus('Copy failed — long-press the log and copy manually.', 'error');
              }
              resetErrorCopyHint();
            });
            return;
          }

          if (fallbackCopyErrorLog(text)) {
            setErrorCopyStatus('Copied the full error log.', 'success');
          } else {
            setErrorCopyStatus('Copy failed — long-press the log and copy manually.', 'error');
          }
          resetErrorCopyHint();
        }

        updateErrorCopyButton();
        setErrorCopyStatus('', 'idle');
        if (errorCopyBtn) {
          errorCopyBtn.addEventListener('click', function () {
            copyErrorLogToClipboard();
          });
        }

        var softKeyboardRedrawTimer = 0;
        function requestSoftKeyboardRedraw(reason) {
          if (!window.Module || !window.Module.raSoftKeyboard) return false;
          window.Module.raSoftKeyboard.pendingRedraw = true;
          window.Module.raSoftKeyboard.log('redraw', reason);
          return true;
        }

        function scheduleSoftKeyboardRedraw(reason) {
          requestSoftKeyboardRedraw(reason);
          if (window.requestAnimationFrame) {
            window.requestAnimationFrame(function () {
              requestSoftKeyboardRedraw(reason + ':raf');
            });
          }
          if (softKeyboardRedrawTimer) {
            clearTimeout(softKeyboardRedrawTimer);
          }
          softKeyboardRedrawTimer = setTimeout(function () {
            softKeyboardRedrawTimer = 0;
            requestSoftKeyboardRedraw(reason + ':settle');
          }, 120);
        }

        function clearSoftKeyboardValue() {
          if (!softKeyboardInput) return;
          if (softKeyboardInput.value) {
            softKeyboardInput.value = '';
          }
        }

        function commitSoftKeyboardText(text) {
          if (!text) return false;
          if (!window.Module || !window.Module.raSoftKeyboard) return false;
          for (var i = 0; i < text.length; ++i) {
            window.Module.raSoftKeyboard.pendingEvents.push(
              ((1 << 24) | (text.charCodeAt(i) & 0x00FFFFFF)) | 0
            );
          }
          return true;
        }

        // There is no built-in SDL3/Emscripten soft-keyboard path today; the
        // browser needs a real DOM editor to focus. Shipped WebGL mobile
        // bridges (for example kou-yeung/WebGLInput) solve this by presenting a
        // body-level text box on mobile and using it as the browser keyboard
        // anchor. We follow the same pattern here so touch users see visible
        // feedback even if the browser rejects the first programmatic focus.
        var softKeyboardQuery = (typeof URLSearchParams !== 'undefined')
          ? new URLSearchParams(location.search)
          : null;
        var forceSoftKeyboardDebug = !!(softKeyboardQuery && softKeyboardQuery.has('vkdebug'));
        var isMobileTouchDevice = (function () {
          var ua = '';
          try { ua = navigator.userAgent || ''; } catch (e) {}
          try {
            if (navigator.userAgentData && navigator.userAgentData.mobile) return true;
          } catch (e2) {}
          if (/Android|iPhone|iPad|iPod|Mobile|Silk|Kindle|Opera Mini|IEMobile/i.test(ua)) {
            return true;
          }
          try {
            if ((navigator.maxTouchPoints && navigator.maxTouchPoints > 0) &&
                window.matchMedia && window.matchMedia('(pointer: coarse)').matches) {
              return true;
            }
          } catch (e3) {}
          return false;
        })();

        function setSoftKeyboardPanelVisible(visible) {
          if (!softKeyboardPanel) return;
          softKeyboardPanel.classList.toggle('active', !!visible);
        }

        var raSoftKeyboard = {
          active: false,
          focused: false,
          focusAttempts: 0,
          pendingEvents: [],
          pendingRedraw: false,
          lastEvent: 'idle',
          lastInput: 'none',
          debug: forceSoftKeyboardDebug,
          log: function () {
            if (!this.debug) return;
            try { console.log.apply(console, ['[ra-vk]'].concat([].slice.call(arguments))); } catch (e) {}
          },
          renderState: function () {
            if (softKeyboardState) {
              if (!isMobileTouchDevice) {
                softKeyboardState.textContent = 'Desktop keyboard path';
              } else if (!this.active) {
                softKeyboardState.textContent = 'Mobile keyboard idle';
              } else if (this.focused) {
                softKeyboardState.textContent = 'Mobile keyboard active';
              } else {
                softKeyboardState.textContent = 'Tap the input bar if the keyboard did not open';
              }
            }
            if (softKeyboardDebug) {
              softKeyboardDebug.textContent = this.debug
                ? ('touch=' + (isMobileTouchDevice ? 'yes' : 'no') +
                   ' active=' + (this.active ? 'yes' : 'no') +
                   ' focused=' + (this.focused ? 'yes' : 'no') +
                   ' attempts=' + this.focusAttempts +
                   ' last=' + this.lastEvent +
                   ' input=' + this.lastInput)
                : '';
            }
            if (softKeyboardInput) {
              softKeyboardInput.setAttribute('aria-disabled', this.active ? 'false' : 'true');
              softKeyboardInput.placeholder = this.active
                ? 'Tap here to type into the selected game field'
                : 'Waiting for a game text field to take focus';
            }
            setSoftKeyboardPanelVisible(isMobileTouchDevice && (this.active || this.debug));
          },
          noteEvent: function (text) {
            this.lastEvent = text;
            this.renderState();
            this.log(text);
          },
          noteInput: function (text) {
            this.lastInput = text || 'none';
            this.renderState();
            this.log('input', this.lastInput);
          },
          focus: function (reason) {
            if (!this.active || !softKeyboardInput) return false;
            this.focusAttempts += 1;
            this.noteEvent('focus:' + reason);
            clearSoftKeyboardValue();
            setSoftKeyboardPanelVisible(true);
            try {
              softKeyboardInput.focus({ preventScroll: true });
            } catch (e) {
              try { softKeyboardInput.focus(); } catch (e2) {}
            }
            try {
              if (navigator.virtualKeyboard) {
                navigator.virtualKeyboard.overlaysContent = true;
                if (navigator.virtualKeyboard.show) {
                  navigator.virtualKeyboard.show();
                }
              }
            } catch (e3) {}
            this.focused = (document.activeElement === softKeyboardInput);
            this.noteEvent((this.focused ? 'focused:' : 'focus-failed:') + reason);
            if (this.focused) {
              scheduleSoftKeyboardRedraw('focus:' + reason);
            }
            return this.focused;
          },
          setActive: function (active) {
            if (!isMobileTouchDevice) {
              this.active = false;
              this.focused = false;
              this.noteEvent('desktop');
              return;
            }
            this.active = !!active;
            this.lastInput = 'none';
            clearSoftKeyboardValue();
            if (this.active) {
              this.focused = (document.activeElement === softKeyboardInput);
              this.noteEvent('armed');
              scheduleSoftKeyboardRedraw('armed');
              this.focus('setActive');
              setTimeout(function () {
                if (raSoftKeyboard.active && document.activeElement !== softKeyboardInput) {
                  raSoftKeyboard.focus('delayed-retry');
                }
              }, 50);
            } else {
              this.focused = false;
              this.noteEvent('disarmed');
              scheduleSoftKeyboardRedraw('disarmed');
              try { softKeyboardInput.blur(); } catch (e4) {}
              try {
                if (navigator.virtualKeyboard && navigator.virtualKeyboard.hide) {
                  navigator.virtualKeyboard.hide();
                }
              } catch (e5) {}
              try { canvas.focus(); } catch (e6) {}
            }
            this.renderState();
          }
        };
        raSoftKeyboard.renderState();

        if (softKeyboardInput) {
          // Stop DOM keyboard events at the bridge element so SDL's window-level
          // listeners never see a duplicate copy of the same key.
          function swallowKeyboardEvent(e) { e.stopPropagation(); }
          ['keydown', 'keyup', 'keypress'].forEach(function (type) {
            softKeyboardInput.addEventListener(type, swallowKeyboardEvent, true);
          });

          softKeyboardInput.addEventListener('focus', function () {
            raSoftKeyboard.focused = true;
            raSoftKeyboard.noteEvent('dom:focus');
            clearSoftKeyboardValue();
            scheduleSoftKeyboardRedraw('dom:focus');
          });

          softKeyboardInput.addEventListener('blur', function () {
            raSoftKeyboard.focused = false;
            raSoftKeyboard.noteEvent('dom:blur');
            clearSoftKeyboardValue();
            scheduleSoftKeyboardRedraw('dom:blur');
          });

          softKeyboardInput.addEventListener('beforeinput', function (e) {
            if (!raSoftKeyboard.active) return;

            raSoftKeyboard.noteInput(e.inputType + (e.data ? ':' + e.data : ''));

            if (e.inputType === 'deleteContentBackward') {
              if (window.Module && window.Module.raSoftKeyboard) {
                window.Module.raSoftKeyboard.pendingEvents.push((2 << 24) | 0);
                e.preventDefault();
                clearSoftKeyboardValue();
              }
              return;
            }

            if (e.inputType === 'insertLineBreak') {
              if (window.Module && window.Module.raSoftKeyboard) {
                window.Module.raSoftKeyboard.pendingEvents.push((3 << 24) | 0);
                e.preventDefault();
                clearSoftKeyboardValue();
              }
              return;
            }

            if ((e.inputType === 'insertText'
                 || e.inputType === 'insertCompositionText'
                 || e.inputType === 'insertFromPaste') && e.data) {
              if (commitSoftKeyboardText(e.data)) {
                e.preventDefault();
                clearSoftKeyboardValue();
              }
            }
          });

          // Fallback for mobile browsers that deliver the text only through
          // `input` (not `beforeinput`). Read the textarea, commit it, then
          // clear it immediately so the browser keeps behaving like a soft-key
          // event source rather than a second text model.
          softKeyboardInput.addEventListener('input', function () {
            if (!raSoftKeyboard.active) {
              clearSoftKeyboardValue();
              return;
            }
            if (softKeyboardInput.value) {
              var txt = softKeyboardInput.value;
              raSoftKeyboard.noteInput('input:' + txt);
              clearSoftKeyboardValue();
              commitSoftKeyboardText(txt);
            }
          });
        }

        // Retry focus from trusted gestures as a fallback. The visible panel is
        // the primary manual escape hatch: if focus() fails, the user can tap
        // the bar directly and still get the browser keyboard.
        function handleSoftKeyboardGesture(ev) {
          if (!raSoftKeyboard.active) return;
          if (!softKeyboardInput) return;
          if (document.activeElement === softKeyboardInput) return;
          if (ev && ev.target === softKeyboardInput) return;
          raSoftKeyboard.focus(ev && ev.type ? ev.type : 'gesture');
        }

        ['pointerdown', 'pointerup',
         'touchstart', 'touchend',
         'mousedown', 'mouseup',
         'click'].forEach(function (type) {
          window.addEventListener(type, handleSoftKeyboardGesture, true);
        });

        if (navigator.virtualKeyboard && navigator.virtualKeyboard.addEventListener) {
          navigator.virtualKeyboard.addEventListener('geometrychange', function () {
            resizeToViewport('virtualKeyboard-geometry');
            scheduleSoftKeyboardRedraw('virtualKeyboard-geometry');
          });
        }

        // ---- Emscripten Module hookup ----------------------------------------
        var totalDeps = 0;
        var Module = {
          preRun: [
            function () {
              // One last chance to size the canvas before main() runs.
              resizeToViewport();
              // Focus the canvas so it receives keyboard input immediately.
              try { canvas.focus(); } catch (e) {}
            }
          ],
          postRun: [
            function () {
              setStatus('');
            }
          ],
          arguments: [],
          canvas: canvas,
          print: function (text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.log(text);
          },
          printErr: function (text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            pushStderrLine(text);
            console.warn(text);
            if (fatalErrorActive) {
              appendErrorLog(stringifyErrorValue(text), false);
            }
          },
          setStatus: function (text) {
            setStatus(text);
          },
          monitorRunDependencies: function (left) {
            totalDeps = Math.max(totalDeps, left);
            if (left) {
              setStatus('Preparing... (' + (totalDeps - left) + '/' + totalDeps + ')');
            } else {
              setStatus('');
            }
          },
          onFullScreen: function (isFs) {
            // Let SDL/emscripten's internal fullscreen path share our resize code.
            resizeToViewport();
          }
        };
        Module.raSoftKeyboard = raSoftKeyboard;

        // Default WebGL context loss handler: pop up a friendly message.
        canvas.addEventListener('webglcontextlost', function (e) {
          e.preventDefault();
          setStatus('WebGL context lost — please reload the page.');
        }, false);

        window.onerror = function (msg, source, lineno, colno, error) {
          var location = '';
          if (source) {
            location = source + (lineno ? ':' + lineno : '') + (colno ? ':' + colno : '');
          }
          reportFatalError(
            'JavaScript error: ' + (stringifyErrorValue(msg) || 'Unknown error'),
            [location, error && error.stack ? error.stack : stringifyErrorValue(error)].filter(Boolean).join('\n')
          );
          Module.setStatus = function (text) {
            if (!text) return;
            console.error('[post-exception status] ' + text);
            appendErrorLog('[post-exception status] ' + text, false);
          };
          return false;
        };

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && 'reason' in event ? event.reason : event;
          reportFatalError(
            'Unhandled promise rejection: ' + (stringifyErrorValue(reason) || 'Unknown rejection'),
            reason && reason.stack ? reason.stack : ''
          );
        });

        window.Module = Module;
        Module.onAbort = function (reason) {
          reportFatalError(
            'Runtime abort: ' + (stringifyErrorValue(reason) || 'Unknown abort'),
            stringifyErrorValue(reason)
          );
        };
        setStatus('Downloading...');
      })();
    </script>
