server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store";
        return 200 "ok\n";
    }

    location = / {
        include /etc/nginx/conf.d/redalert-basic-auth.conf;
        return 302 /redalert.html;
    }

    location / {
        include /etc/nginx/conf.d/redalert-basic-auth.conf;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location /GameData/ {
        include /etc/nginx/conf.d/redalert-basic-auth.conf;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
